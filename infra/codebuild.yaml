AWSTemplateFormatVersion: "2010-09-09"
Description: Caixa Postal CodeBuild project — builds+pushes the app container so participants can redeploy without needing Docker locally.

Parameters:
  ProjectTag: {Type: String, Default: hackathon-2026}
  BucketName: {Type: String, Description: S3 bucket that holds caixa-src.zip}
  EcrRepoName: {Type: String, Default: caixa}

Resources:
  Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: caixa-codebuild
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - {Effect: Allow, Principal: {Service: codebuild.amazonaws.com}, Action: sts:AssumeRole}
      Policies:
        - PolicyName: caixa-codebuild-inline
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action: [s3:GetObject, s3:GetObjectVersion, s3:ListBucket]
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: "*"
      Tags: [{Key: Project, Value: !Ref ProjectTag}]

  Project:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: caixa-build
      ServiceRole: !GetAtt Role.Arn
      Source:
        Type: S3
        Location: !Sub "${BucketName}/caixa-src.zip"
        BuildSpec: buildspec.yml
      Artifacts: {Type: NO_ARTIFACTS}
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        ComputeType: BUILD_GENERAL1_MEDIUM
        PrivilegedMode: true   # required for docker build
        EnvironmentVariables:
          - {Name: AWS_DEFAULT_REGION, Value: !Ref "AWS::Region"}
          - {Name: ECR_REPO, Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepoName}"}
      TimeoutInMinutes: 20
      Tags: [{Key: Project, Value: !Ref ProjectTag}]

Outputs:
  ProjectName: {Value: !Ref Project, Export: {Name: CaixaCodeBuildProject}}
