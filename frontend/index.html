<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Caixa Postal — Universal Inbox</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📬</text></svg>"/>
<link rel="stylesheet" href="/static/app.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="side-hdr">
      <span class="logo">📬</span>
      <span class="title">Caixa Postal</span>
    </div>

    <nav class="side-nav">
      <button class="nav-item active" data-view="home">
        <span class="ic">🏠</span>
        <span class="lbl">Home</span>
      </button>
    </nav>

    <div class="side-section">
      <div class="side-section-hdr">AGENTES</div>
      <div id="agentsList"></div>
    </div>

    <div class="side-section">
      <div class="side-section-hdr">CARDS</div>
      <div id="cardsList"></div>
    </div>

    <div class="side-section" id="bcSection">
      <div class="side-section-hdr" style="cursor:pointer" onclick="document.getElementById('bcPanel').style.display=document.getElementById('bcPanel').style.display==='none'?'block':'none'">
        🔗 BEAUTYCORE <span style="font-size:10px;color:var(--sub)" id="bcStatus">desconectado</span>
      </div>
      <div id="bcPanel" style="display:none;padding:8px 14px">
        <select id="bcUser" style="width:100%;background:var(--bg);border:1px solid var(--stroke);color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;margin-bottom:6px">
          <option value="admin@beautycore.com.br">admin (CRUD total)</option>
          <option value="analista@beautycore.com.br">analista (leitura)</option>
          <option value="estoque@beautycore.com.br">estoque (inventario)</option>
        </select>
        <button onclick="bcConnect()" id="bcBtn" style="width:100%;background:var(--accent);color:#052f25;border:0;border-radius:6px;padding:6px;font-weight:600;cursor:pointer;font-size:12px">Conectar</button>
        <div id="bcResult" style="margin-top:8px;font-size:11px;display:none">
          <div style="color:var(--sub)">Grupos: <span id="bcGroups" style="color:var(--accent)"></span></div>
          <div style="color:var(--sub);margin-top:4px">Teste API: <span id="bcTest"></span></div>
          <div style="margin-top:6px">
            <button onclick="bcCopyToken()" style="background:var(--stroke);color:var(--text);border:0;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer">Copiar JWT</button>
            <span id="bcCopied" style="color:var(--accent);font-size:10px;margin-left:4px"></span>
          </div>
          <div style="margin-top:6px;color:var(--sub);font-size:10px">
            API: <code style="font-size:10px" id="bcApiUrl"></code><br>
            Client ID: <code style="font-size:10px" id="bcClientId"></code>
          </div>
        </div>
      </div>
    </div>

    <div class="side-footer">
      <a href="#" id="addAgentBtn" class="add-btn">+ criar agente</a>
    </div>

    <script>
    let _bcToken = '';
    const _bcPasswords = {
      'admin@beautycore.com.br': 'BeautyAdmin2026!',
      'analista@beautycore.com.br': 'BeautyRead2026!',
      'estoque@beautycore.com.br': 'BeautyStock2026!',
    };
    async function bcConnect() {
      const email = document.getElementById('bcUser').value;
      const btn = document.getElementById('bcBtn');
      btn.disabled = true; btn.textContent = 'conectando...';
      try {
        const r = await fetch('/api/connections/beautycore/login', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({email, password: _bcPasswords[email]})
        });
        const d = await r.json();
        if (d.ok) {
          _bcToken = d.full_id_token;
          document.getElementById('bcStatus').textContent = d.groups.join(', ');
          document.getElementById('bcStatus').style.color = '#00a884';
          document.getElementById('bcGroups').textContent = d.groups.join(', ');
          document.getElementById('bcTest').innerHTML = d.test.ok
            ? `<span style="color:#4ade80">OK (${d.test.batons} batons)</span>`
            : '<span style="color:#fb7185">falhou</span>';
          document.getElementById('bcApiUrl').textContent = d.api_url;
          document.getElementById('bcClientId').textContent = d.cognito_client_id;
          document.getElementById('bcResult').style.display = 'block';
          btn.textContent = 'Reconectar';
        } else {
          document.getElementById('bcStatus').textContent = d.error;
          document.getElementById('bcStatus').style.color = '#fb7185';
          btn.textContent = 'Conectar';
        }
      } catch(e) {
        document.getElementById('bcStatus').textContent = 'erro';
        btn.textContent = 'Conectar';
      }
      btn.disabled = false;
    }
    function bcCopyToken() {
      navigator.clipboard.writeText(_bcToken).then(() => {
        document.getElementById('bcCopied').textContent = 'copiado!';
        setTimeout(() => document.getElementById('bcCopied').textContent = '', 2000);
      });
    }
    </script>
  </aside>

  <main class="main" id="main">
    <!-- Dynamic view mounts here -->
  </main>
  <!-- Mobile hamburger (hidden on desktop via CSS) -->
  <button id="hamBtn" onclick="document.getElementById('sidebar').classList.toggle('open')"
    style="display:none;position:fixed;top:10px;left:10px;z-index:60;background:#111b21;border:1px solid #2a3942;color:#e9edef;border-radius:8px;padding:6px 12px;font-size:18px;cursor:pointer">☰</button>
  <style>
    @media(max-width:720px){
      #hamBtn{display:block!important}
    }
  </style>

</div>

<template id="tpl-home">
  <div class="view view-home">
    <header class="view-hdr">
      <div class="view-title">🏠 Home</div>
      <div class="view-sub">Visão geral da sua caixa postal — tudo que os agentes gravaram.</div>
      <div class="view-actions">
        <button id="refreshAll" class="btn">↻ atualizar</button>
        <button id="resetAll" class="btn danger">🧹 zerar tudo</button>
      </div>
    </header>
    <div class="home-grid" id="homeGrid"></div>
  </div>
</template>

<template id="tpl-chat">
  <div class="view view-chat">
    <header class="chat-hdr">
      <span class="avatar" id="chatAvatar">🤖</span>
      <div class="chat-hdr-body">
        <div class="chat-hdr-name" id="chatName">Concierge</div>
        <div class="chat-hdr-sub" id="chatSub">online</div>
      </div>
      <button class="btn" id="briefBtn" title="Peça um briefing">🌅 briefing</button>
      <button class="btn" id="clearThreadBtn" title="Esquecer contexto desse chat">🧹</button>
    </header>
    <div class="messages" id="messages"></div>
    <div class="agent-strip" id="agentStrip"></div>
    <div class="compose">
      <button class="iconbtn" title="Anexar imagem" id="attachBtn">📎</button>
      <input id="fileIn" type="file" accept="image/*" hidden/>
      <input id="textIn" type="text" placeholder="Digite uma mensagem"/>
      <button class="iconbtn" id="recBtn" title="Gravar áudio">🎤</button>
      <button class="iconbtn send" id="sendBtn" title="Enviar">➤</button>
    </div>
  </div>
</template>

<template id="tpl-card">
  <div class="view view-card">
    <header class="view-hdr">
      <div class="view-title" id="cardTitle">Card</div>
      <div class="view-sub" id="cardSub"></div>
      <div class="view-actions">
        <button id="backHome" class="btn">← home</button>
        <button id="cardRefresh" class="btn">↻</button>
      </div>
    </header>
    <div class="card-body" id="cardBody"></div>
  </div>
</template>

<template id="tpl-sheet">
  <aside class="sheet">
    <header class="sheet-hdr">
      <div class="sheet-title" id="sheetTitle">Item</div>
      <button class="iconbtn" id="sheetClose" title="Fechar">✕</button>
    </header>
    <div class="sheet-body" id="sheetBody"></div>
    <footer class="sheet-actions">
      <button class="btn danger" id="sheetDelete">🗑 deletar</button>
      <div style="flex:1"></div>
      <button class="btn" id="sheetCancel">cancelar</button>
      <button class="btn primary" id="sheetSave">💾 salvar</button>
    </footer>
  </aside>
</template>

<!-- Auth banner — shows when AUTH_ENABLED=true but user is not logged in -->
<div id="authBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(135deg,#005c4b,#1a3a2a);padding:10px 20px;text-align:center;font-size:14px;border-bottom:1px solid #00a884">
  🔐 <strong>Faca login</strong> pra ter sua propria area de dados separada dos outros participantes.
  <a href="/auth/login" style="color:#fff;background:#00a884;padding:4px 16px;border-radius:6px;text-decoration:none;font-weight:600;margin-left:12px">Entrar</a>
</div>
<script>
  fetch('/api/me').then(r=>r.json()).then(d=>{
    if(d.auth_enabled && !d.authenticated){
      document.getElementById('authBanner').style.display='block';
      document.querySelector('.main').style.paddingTop='48px';
    }
  }).catch(()=>{});
</script>

<!-- Event bar — fixed at bottom, content area padded to avoid overlap -->
<div id="eventBar" style="position:fixed;bottom:0;left:300px;right:0;z-index:100;background:#111b21;border-top:1px solid #2a3942;display:flex;justify-content:center;gap:12px;padding:8px 16px;font-size:13px">
  <a href="/desafio" target="_blank" style="color:#00a884;text-decoration:none;font-weight:600">🏆 Desafio</a>
  <span style="color:#2a3942">|</span>
  <a href="/chat" target="_blank" style="color:#00a884;text-decoration:none;font-weight:600">💬 Chat</a>
  <span style="color:#2a3942">|</span>
  <a href="/cheatsheet" target="_blank" style="color:#8696a0;text-decoration:none">📋 Cheatsheet</a>
</div>
<style>
  /* Reserve space for the fixed event bar */
  .view { padding-bottom: 44px; }
  .messages { padding-bottom: 44px; }
  @media(max-width:720px){ #eventBar { left: 0; } }
</style>

<div id="toast" class="toast hidden" role="status"></div>

<script src="/static/app.js"></script>
</body>
</html>
